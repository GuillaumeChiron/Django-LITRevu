{% load static %}

<html>
    <head>
        <title>LITRevu</title>
        <link rel="stylesheet" href="{% static 'app.css' %}">
    </head>
    <body>
        
        {% block content %}{% endblock content %}

        {% if user.is_authenticated %}

        <p>
            {{ request.user }} : connecté

            <form method="post" action="{% url 'logout-page' %}">
            {% csrf_token %}
            <button class="cancel-btn" type="submit">Se déconnecter</button>
            </form>
        </p>

    {% endif %}

    </body>

</html>
