{% extends 'base.html' %}
{% load static %}

{% block extras_css %}
<link rel="stylesheet" href="{% static 'pages/ticket_review.css' %}">
{% endblock extras_css %}

{% block content %}

<main class="publication-page">
    <section class="publication-card">
        <h2>Créer une critique</h2>

        <form class="publication-form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <fieldset>
                <legend>Votre critique</legend>
                {{ form.as_p }}
            </fieldset>
            
            <button type="submit">Publier</button>
        </form>

        <p class="form-actions">
            <a class="cancel-btn" href="{% url 'home-page' %}">Retour</a>
        </p>
    </section>
</main>

{% endblock content %}
