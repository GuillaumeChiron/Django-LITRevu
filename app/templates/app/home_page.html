{% extends 'base.html' %}

{% block content %}

<h2>bienvenue sur l'application BooksAPP</h2>
<p><a href="{% url 'create-ticket' %}">Publier un article</a></p>

<div class="ticket-box">
    {% for ticket in tickets %}
    <p>{{ticket.title}}</p>
    <p>{{ticket.description}}</p>
    <p><img src="{{ticket.image.url}}" alt="image"></p>
    <p><a href="{% url 'create-review-response' ticket.id %}">Créer la Review</a></p>
    {% endfor %}
</div>

{% endblock content %}
