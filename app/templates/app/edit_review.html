{% extends 'base.html' %}
{% load static %}

{% block extras_css %}
<link rel="stylesheet" href="{% static 'pages/ticket_review.css' %}">
{% endblock extras_css %}

{% block content %}

<main class="publication-page">
    <section class="publication-card">
        <h2>Modifier la critique</h2>

        <form class="publication-form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ review_form.as_p }}
            <button type="submit">Modifier</button>
        </form>

        <div class="form-actions">
            <a class="delete-btn" href="{% url 'delete-review' review.id %}">Supprimer</a>
            <a class="cancel-btn" href="{% url 'home-page' %}">Retour</a>
        </div>
    </section>
</main>

{% endblock content %}
