{% extends 'base.html' %}

{% block content %}

<div class="login-box">
    <h2>Inscription</h2>

    {% if form.errors %}
        {{ form.errors }}
    {% endif %}

    <form method="post">
        {{ form.as_p }}
        {% csrf_token %}
        <button type="submit">S'inscrire</button>
    </form>
    <p><a class="cancel-btn" href="{% url 'login-page' %}">Annuler</a></p>
</div>

{% endblock content %}
